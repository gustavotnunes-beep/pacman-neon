<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pac-Man Neon</title>

<style>
body{
    margin:0;
    background:#0f0f1a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
    color:white;
}

#container{
    text-align:center;
}

canvas{
    background:#111;
    border:4px solid #00ffff;
    box-shadow:0 0 20px #00ffff;
}

button{
    margin-top:10px;
    padding:10px 20px;
    background:#00ffff;
    border:none;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>
<body>

<div id="container">
<h1>Pac-Man Neon</h1>
<p>Pontos: <span id="score">0</span> | Vidas: <span id="lives">3</span></p>
<canvas id="game"></canvas>
<br>
<button onclick="startGame()">Iniciar</button>
</div>

<script>
const tile = 20;
const mapData = [
"####################",
"#........##........#",
"#.####.#.##.#.####.#",
"#..................#",
"#.####.#.##.#.####.#",
"#........##........#",
"####################",
"#..................#",
"#.####.######.####.#",
"#........##........#",
"#######.##  ##.#####",
"#..................#",
"#.####.#.##.#.####.#",
"#........##........#",
"####################"
];

const rows = mapData.length;
const cols = mapData[0].length;

const canvas = document.getElementById("game");
canvas.width = cols * tile;
canvas.height = rows * tile;
const ctx = canvas.getContext("2d");

let map;
let pacman;
let ghosts;
let score;
let lives;
let running=false;

function resetMap(){
    map = mapData.map(r=>r.split(""));
}

function startGame(){
    resetMap();
    score=0;
    lives=3;
    running=true;

    pacman={x:1,y:1,dx:0,dy:0};

    ghosts=[
        {x:10,y:7,color:"red"},
        {x:9,y:7,color:"pink"},
        {x:11,y:7,color:"cyan"},
        {x:10,y:8,color:"orange"}
    ];

    document.getElementById("score").innerText=score;
    document.getElementById("lives").innerText=lives;
}

document.addEventListener("keydown",e=>{
    if(!running)return;
    if(e.key==="ArrowUp"){pacman.dx=0;pacman.dy=-1;}
    if(e.key==="ArrowDown"){pacman.dx=0;pacman.dy=1;}
    if(e.key==="ArrowLeft"){pacman.dx=-1;pacman.dy=0;}
    if(e.key==="ArrowRight"){pacman.dx=1;pacman.dy=0;}
});

function drawMap(){
    for(let y=0;y<rows;y++){
        for(let x=0;x<cols;x++){
            if(map[y][x]==="#"){
                ctx.fillStyle="#001f3f";
                ctx.fillRect(x*tile,y*tile,tile,tile);
            }
            if(map[y][x]==="."){
                ctx.fillStyle="white";
                ctx.beginPath();
                ctx.arc(x*tile+10,y*tile+10,3,0,Math.PI*2);
                ctx.fill();
            }
        }
    }
}

function drawPacman(){
    ctx.fillStyle="yellow";
    ctx.beginPath();
    ctx.arc(pacman.x*tile+10,pacman.y*tile+10,8,0.2*Math.PI,1.8*Math.PI);
    ctx.lineTo(pacman.x*tile+10,pacman.y*tile+10);
    ctx.fill();
}

function drawGhost(g){
    ctx.fillStyle=g.color;
    ctx.beginPath();
    ctx.arc(g.x*tile+10,g.y*tile+10,8,0,Math.PI*2);
    ctx.fill();
}

function movePacman(){
    let nx=pacman.x+pacman.dx;
    let ny=pacman.y+pacman.dy;

    if(map[ny] && map[ny][nx]!=="#"){
        pacman.x=nx;
        pacman.y=ny;

        if(map[ny][nx]==="."){
            map[ny][nx]=" ";
            score+=10;
            document.getElementById("score").innerText=score;
        }
    }
}

function moveGhost(g){
    let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
    dirs.sort(()=>Math.random()-0.5);

    for(let d of dirs){
        let nx=g.x+d[0];
        let ny=g.y+d[1];
        if(map[ny] && map[ny][nx]!=="#"){
            g.x=nx;
            g.y=ny;
            break;
        }
    }
}

function checkCollision(){
    for(let g of ghosts){
        if(g.x===pacman.x && g.y===pacman.y){
            lives--;
            document.getElementById("lives").innerText=lives;
            pacman.x=1;
            pacman.y=1;
            if(lives<=0){
                alert("Game Over");
                running=false;
            }
        }
    }
}

function gameLoop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(running){
        movePacman();
        ghosts.forEach(moveGhost);
        checkCollision();
    }

    drawMap();
    drawPacman();
    ghosts.forEach(drawGhost);

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
